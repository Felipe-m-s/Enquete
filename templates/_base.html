{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% block head_title %}
        Voto Inteligente
        {% endblock %}
    </title>
    <link rel="shortcut icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}">
    {% block css %}
    {% endblock %}

</head>
<style>
    body {
        
        background: linear-gradient(135deg, #0E2B33 0%, #1a4a57 100%);
        
        background-attachment: fixed;
        background-repeat: no-repeat;
        background-size: cover;
        
        
        min-height: 100vh;
        
        color: #ffffff;
        margin: 0;
    }

    
    .container {
        padding-top: 2rem;
    }

    a {
        color: #4dd0e1;
        text-decoration: none;
    }
    a:hover {
        color: #ffffff;
    }
    .card {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 15px;
    padding: 20px;
    align-items: center;
    }

    .card-title-question {
        display: inline-block;
        background-color: rgba(0, 210, 255, 0.2);
        color: #00d2ff;
        padding: 5px 15px;
        border-radius: 50px;
        font-size: 0.8rem;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 2px;
        border: 1px solid rgba(0, 210, 255, 0.3);
        margin-bottom: 15px;
    }

    h1 {
        font-size: 2rem;
        font-weight: 800;
        color: #ffffff;
        line-height: 1.3;
        margin-bottom: 2rem;
        text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }

    #btn-salvarEscolha {
        background: linear-gradient(45deg, #007bff, #00d2ff);
        border: none;
        border-radius: 50px;
        padding: 12px 35px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 1px;
        box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
        transition: all 0.3s ease;
        align-items: right;
    }

    #btn-salvarEscolha:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0, 210, 255, 0.5);
    }

    .nav-link {
        color: rgba(255, 255, 255, 0.7) !important;
        font-weight: 500;
        transition: color 0.3s;
    }

    .nav-link:hover {
        color: #00d2ff !important;
    }

    input[type="radio"] {
        display: none;
    }

    #choice {
        display: block;
        background: rgba(255, 255, 255, 0.05);
        border: 2px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 15px 20px;
        margin-bottom: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
        color: #ced4da;
    }

    #choice:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.3);
    }

    /* Estilo quando a opção está marcada */
    input[type="radio"]:checked + #choice {
        background: rgba(0, 210, 255, 0.1);
        border-color: #00d2ff;
        color: #ffffff;
        box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
    }

</style>
<body>
    {% block header %}
    {% endblock %}

    {% block main %}
        {% block content %}
        {% endblock %}
    {% endblock %}   
    
    {% block footer %}
    {% endblock %}

    {% block javascript %}
    {% endblock %}
    
</body>
</html>
