{% extends '_layout1.html' %}

{% block content %}
    <ul class="list-unstyled">
        {% for choice in votes %}
            <li>
                {{ choice.choice_text }} - {{ choice.votes }} voto{{ choice.votes|pluralize }}
                <div class="progress" style="height: 30px;">
                    <div 
                        class="progress-bar h6"
                        role="progressbar"
                        style="width: {{ choice.percentage|floatformat:0 }}%; height: 30px;"
                        aria-valuenow="{{ choice.percentage|floatformat:0 }}"
                        aria-valuemin="0"
                        aria-valuemax="100">
                        {{ choice.percentage|floatformat:0 }}%
                    </div>
                </div>
            </li>
        {% endfor %}
    </ul>
{% endblock %}
